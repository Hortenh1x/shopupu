spring:
  application:
    name: shopupu

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shopupu}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    show-sql: false

  flyway:
    baseline-on-migrate: true
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: ${JWT_SECRET:6A94C1D9F8A263B9E1A0C4F233B0D8226A9C1E7B5F2A1D4B9E5A7C3D2F1B8E9C6A94C1D9F8A263B9E1A0C4F233B0D822}
  access-token-ttl-min: 15
  refresh-token-ttl-days: 7

logging:
  level:
    org.hibernate.SQL: INFO

payments:
  default-provider: ${PAYMENTS_DEFAULT_PROVIDER:stub}
  currency: ${PAYMENT_CURRENCY:EUR}
  service-base-url: ${PAYMENT_SERVICE_BASE_URL:}
  service-client-id: ${PAYMENT_SERVICE_CLIENT_ID:shopupu}
  service-secret: ${PAYMENT_SERVICE_SECRET:}
  callback-secret: ${PAYMENT_CALLBACK_SECRET:}
  callback-url: ${PAYMENT_CALLBACK_URL:http://localhost:8080/api/payments/callback}
  request-timeout-seconds: ${PAYMENT_REQUEST_TIMEOUT_SECONDS:10}

server:
  port: ${SERVER_PORT:8080}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://127.0.0.1:3000}
  uploads:
    dir: ${UPLOADS_DIR:uploads}
    public-base-url: ${PUBLIC_UPLOADS_BASE_URL:http://localhost:8080/uploads}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    email: ${BOOTSTRAP_ADMIN_EMAIL:dmytro.bolibok@gmail.com}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}

shipping:
  currency: EUR
  rates:
    dhl: 9.99
    standardPost: 4.99
    localPickup: 0.00
    defaultRate: 7.49
